<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WeatherFlow Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="script.js" defer></script>
<style>
:root{
  --bg:linear-gradient(135deg,#e9f3ff 0%,#f6f9ff 45%,#edf7f5 100%);
  --surface:#ffffff;
  --surface-2:#f6f8ff;
  --text:#0d1b2a;
  --muted:#56657a;
  --primary:#2563eb;
  --primary-soft:#dbeafe;
  --success:#0f766e;
  --border:#d9e2f2;
  --shadow:0 18px 45px rgba(15, 23, 42, 0.12);
}
body.dark-theme{
  --bg:linear-gradient(135deg,#090e1a 0%,#10182a 45%,#07141b 100%);
  --surface:#101a2e;
  --surface-2:#16233f;
  --text:#eaf2ff;
  --muted:#b8c5dd;
  --primary:#60a5fa;
  --primary-soft:#1d365e;
  --success:#2dd4bf;
  --border:#2a3a5e;
  --shadow:0 18px 45px rgba(1, 4, 12, 0.45);
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:.3s}
.container{max-width:1100px;margin:0 auto;padding:18px}
.hero{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.hero h1{margin:0;font-size:clamp(1.5rem,4vw,2.2rem)}
.subtitle{margin:.35rem 0 0;color:var(--muted)}
#themeToggleBtn{border:1px solid var(--border);background:var(--surface);color:var(--text);padding:9px 13px;border-radius:12px;font-weight:700;cursor:pointer}
.panel{background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:18px;padding:16px;margin-top:16px}
.controls-grid{display:grid;grid-template-columns:2fr 1fr;gap:12px}
.input-wrap{position:relative}
#cityInput{width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;background:var(--surface-2);color:var(--text)}
#autocompleteResults{position:absolute;top:48px;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;max-height:180px;overflow:auto;z-index:2}
.result-row{padding:9px 11px;cursor:pointer}.result-row:hover{background:var(--primary-soft)}
.button-row{display:flex;gap:8px;flex-wrap:wrap}
button{padding:10px 12px;border-radius:10px;border:0;cursor:pointer;font-weight:700}
#getWeatherBtn{background:var(--primary);color:white}#locateBtn{background:#0ea5e9;color:#fff}#forecastBtn{background:#f59e0b;color:#111827}#mapSelectBtn{background:#8b5cf6;color:#fff}
#unitToggle{display:flex;gap:10px;align-items:center;margin-top:12px;color:var(--muted)}
#recentSearches{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{background:var(--primary-soft);color:var(--primary);padding:5px 10px;border-radius:999px;font-size:.85rem;cursor:pointer}
#weatherDisplay{display:grid;grid-template-columns:1.2fr 1fr;gap:12px}
.card{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:14px}
#forecastContainer .day{border:1px solid var(--border);border-radius:12px;padding:10px;margin-top:8px}
#map{height:320px;border-radius:12px}
#loading{display:none;font-weight:700;color:var(--primary)}
.muted{color:var(--muted)}
@media (max-width:900px){.controls-grid,#weatherDisplay{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <header class="hero">
    <div>
      <h1>WeatherFlow Dashboard</h1>
      <p class="subtitle">Fast weather insights with forecast, AQI, location search, and map selection.</p>
    </div>
    <button id="themeToggleBtn">Switch Theme</button>
  </header>

  <section class="panel">
    <div class="controls-grid">
      <div>
        <div class="input-wrap">
          <input type="text" id="cityInput" placeholder="Search city..." autocomplete="off"/>
          <div id="autocompleteResults"></div>
        </div>
        <div class="button-row" style="margin-top:10px">
          <button id="getWeatherBtn">Get Weather</button><button id="locateBtn">Use My Location</button><button id="forecastBtn">5-Day Forecast</button><button id="mapSelectBtn">Pick on Map</button>
        </div>
      </div>
      <div>
        <div id="unitToggle"><label><input type="radio" name="unit" value="metric" checked/> Celsius (°C)</label><label><input type="radio" name="unit" value="imperial"/> Fahrenheit (°F)</label></div>
        <div style="margin-top:12px" id="recentActions"><div id="recentSearches"></div><button id="clearRecentBtn" style="margin-top:10px;background:#ef4444;color:#fff">Clear Recent</button></div>
      </div>
    </div>
  </section>

  <section id="mapContainer" class="panel" style="display:none">
    <h3 style="margin-top:0">Select a location</h3>
    <div id="map"></div>
    <button id="confirmMapSelection" style="margin-top:10px;background:var(--success);color:#fff">Confirm Location</button>
  </section>

  <section id="weatherDisplay" class="panel">
    <div class="card"><div id="loading">Loading weather data…</div><div id="currentWeather"></div></div>
    <div class="card"><div id="airQualityContainer"></div><div id="forecastContainer"></div></div>
  </section>
</div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</body>
</html>
