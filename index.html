<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Advanced Weather App with Themes</title>
<!-- Leaflet CSS for map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
  :root {
	--bg-color-light: #f0f8ff;
	--text-color-light: #000;
	--bg-color-dark: #222;
	--text-color-dark: #fff;
  }

  body {
	font-family: Arial, sans-serif;
	margin: 0;
	padding: 10px;
	background-color: var(--bg-color-light);
	color: var(--text-color-light);
	transition: background-color 0.3s, color 0.3s;
  }

  body.dark-theme {
	background-color: var(--bg-color-dark);
	color: var(--text-color-dark);
  }

  h1 {
	text-align: center;
  }

  #themeToggleBtn {
	position: fixed;
	top: 10px;
	right: 10px;
	padding: 8px 12px;
	border: none;
	border-radius: 4px;
	cursor: pointer;
	font-weight: bold;
	z-index: 999;
  }

  #controls {
	display: flex;
	flex-wrap: wrap;
	gap: 10px;
	justify-content: center;
	margin-bottom: 10px;
  }

  #search-section {
	flex: 1 1 300px;
	display: flex;
	flex-direction: column;
	gap: 5px;
	position: relative;
  }

  #cityInput {
	padding: 8px;
	font-size: 1em;
  }

  #autocompleteResults {
	border: 1px solid #ccc;
	max-height: 150px;
	overflow-y: auto;
	background: #fff;
	position: absolute;
	top: 50px;
	width: 100%;
	z-index: 1000;
  }

  body.dark-theme #autocompleteResults {
	background: #333;
	border-color: #555;
	color: #fff;
  }

  #buttons {
	display: flex;
	gap: 5px;
  }

  button {
	padding: 8px;
	border: none;
	border-radius: 4px;
	cursor: pointer;
	font-weight: bold;
  }

  #getWeatherBtn { background-color: #4CAF50; color: white; }
  #locateBtn { background-color: #2196F3; color: white; }
  #forecastBtn { background-color: #ff9800; color: white; }
  #mapSelectBtn { background-color: #9c27b0; color: white; }
  #themeToggleBtn { background-color: #555; color: #fff; }

  #unitToggle {
	margin-top: 5px;
  }

  #weatherDisplay {
	max-width: 900px;
	margin: 20px auto;
	padding: 10px;
	background: #fff;
	border-radius: 8px;
	box-shadow: 0 0 10px rgba(0,0,0,0.1);
	transition: background-color 0.3s, color 0.3s;
  }

  body.dark-theme #weatherDisplay {
	background: #333;
	color: #fff;
  }

  #currentWeather, #forecastContainer {
	margin-bottom: 20px;
  }

  #mapContainer {
	height: 300px;
	margin-bottom: 20px;
  }

  /* Responsive */
  @media(max-width: 700px){
	#controls {
	  flex-direction: column;
	}
  }
</style>
</head>
<body>
<button id="themeToggleBtn">Switch to Dark Mode</button>

<h1>Advanced Weather App with Themes</h1>

<div id="controls">
  <div id="search-section">
	<input type="text" id="cityInput" placeholder="Search city..." autocomplete="off"/>
	<div id="autocompleteResults"></div>
	<div style="margin-top:5px;">
	  <button id="getWeatherBtn">Get Weather</button>
	  <button id="locateBtn">Use My Location</button>
	  <button id="forecastBtn">Show 5-Day Forecast</button>
	  <button id="mapSelectBtn">Select on Map</button>
	</div>
	<div id="unitToggle">
	  <label><input type="radio" name="unit" value="metric" checked /> °C</label>
	  <label><input type="radio" name="unit" value="imperial" /> °F</label>
	</div>
  </div>
</div>

<div id="mapContainer" style="display:none;">
  <div id="map"></div>
  <button id="confirmMapSelection" style="margin-top:10px;">Confirm Location</button>
</div>

<div id="weatherDisplay">
  <div id="loading" style="text-align:center; display:none;">Loading...</div>
  <div id="currentWeather"></div>
  <div id="forecastContainer"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const apiKey = 'f822fe46aea7d7f62842fb124e64db9b'; // Your OpenWeatherMap API key

let currentUnit = 'metric'; // default
let lastCity = '';
let map;
let selectedLatLng = null;

// Elements
const cityInput = document.getElementById('cityInput');
const autocompleteResults = document.getElementById('autocompleteResults');
const getWeatherBtn = document.getElementById('getWeatherBtn');
const locateBtn = document.getElementById('locateBtn');
const forecastBtn = document.getElementById('forecastBtn');
const mapSelectBtn = document.getElementById('mapSelectBtn');
const currentWeatherDiv = document.getElementById('currentWeather');
const forecastContainer = document.getElementById('forecastContainer');
const loadingDiv = document.getElementById('loading');
const mapContainer = document.getElementById('mapContainer');
const mapDiv = document.getElementById('map');
const confirmMapBtn = document.getElementById('confirmMapSelection');
const themeToggleBtn = document.getElementById('themeToggleBtn');
const body = document.body;
const themeIndicator = document.getElementById('themeToggleBtn');

// Detect initial theme based on device
function detectDeviceTheme() {
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
	body.classList.add('dark-theme');
	themeToggleBtn.textContent = 'Switch to Light Mode';
  } else {
	body.classList.remove('dark-theme');
	themeToggleBtn.textContent = 'Switch to Dark Mode';
  }
}
detectDeviceTheme();

// Toggle theme manually
themeToggleBtn.addEventListener('click', () => {
  if (body.classList.contains('dark-theme')) {
	body.classList.remove('dark-theme');
	themeToggleBtn.textContent = 'Switch to Dark Mode';
  } else {
	body.classList.add('dark-theme');
	themeToggleBtn.textContent = 'Switch to Light Mode';
  }
});

// Show loading
function showLoading() {
  loadingDiv.style.display = 'block';
}
function hideLoading() {
  loadingDiv.style.display = 'none';
}

// Fetch weather by city name
function fetchWeather(city) {
  lastCity = city;
  showLoading();
  clearForecast();
  fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=${currentUnit}&appid=${apiKey}`)
	.then(res => {
	  if (!res.ok) throw new Error('City not found');
	  return res.json();
	})
	.then(data => {
	  hideLoading();
	  displayCurrentWeather(data);
	})
	.catch(err => {
	  hideLoading();
	  currentWeatherDiv.innerHTML = `<p style="color:red;">${err.message}</p>`;
	});
}

// Fetch weather by coordinates
function fetchWeatherByCoords(lat, lon) {
  showLoading();
  clearForecast();
  fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=${currentUnit}&appid=${apiKey}`)
	.then(res => {
	  if (!res.ok) throw new Error('Unable to fetch weather data');
	  return res.json();
	})
	.then(data => {
	  hideLoading();
	  displayCurrentWeather(data);
	})
	.catch(err => {
	  hideLoading();
	  currentWeatherDiv.innerHTML = `<p style="color:red;">${err.message}</p>`;
	});
}

// Display current weather
function displayCurrentWeather(data) {
  const { name, main, weather } = data;
  const iconUrl = `https://openweathermap.org/img/wn/${weather[0].icon}@2x.png`;
  currentWeatherDiv.innerHTML = `
	<h2>Weather in ${name}</h2>
	<img src="${iconUrl}" alt="${weather[0].description}"/>
	<p style="font-size:1.2em;">Temperature: ${Math.round(main.temp)} °${currentUnit==='metric'?'C':'F'}</p>
	<p>Condition: ${weather[0].description.charAt(0).toUpperCase() + weather[0].description.slice(1)}</p>
  `;
}

// Clear forecast
function clearForecast() {
  forecastContainer.innerHTML = '';
}

// Fetch forecast for 5 days
function fetchForecast(city) {
  showLoading();
  fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&units=${currentUnit}&appid=${apiKey}`)
	.then(res => {
	  if (!res.ok) throw new Error('Forecast data not available');
	  return res.json();
	})
	.then(data => {
	  hideLoading();
	  displayForecast(data);
	})
	.catch(err => {
	  hideLoading();
	  forecastContainer.innerHTML = `<p style="color:red;">${err.message}</p>`;
	});
}

// Display forecast
function displayForecast(data) {
  forecastContainer.innerHTML = '<h3>5-Day Forecast</h3>';
  const forecastByDay = {};

  data.list.forEach(entry => {
	const dateStr = entry.dt_txt.split(' ')[0];
	if (!forecastByDay[dateStr]) forecastByDay[dateStr] = [];
	forecastByDay[dateStr].push(entry);
  });

  for (const date in forecastByDay) {
	const entries = forecastByDay[date];
	const temps = entries.map(e => e.main.temp);
	const avgTemp = Math.round(temps.reduce((a,b) => a+b,0)/temps.length);
	const weatherDesc = entries[0].weather[0].description;
	const iconUrl = `https://openweathermap.org/img/wn/${entries[0].weather[0].icon}@2x.png`;

	forecastContainer.innerHTML += `
	  <div style="border:1px solid #ccc; padding:8px; border-radius:8px; margin-bottom:8px;">
		<h4>${date}</h4>
		<img src="${iconUrl}" alt="${weatherDesc}" style="width:50px; height:50px;"/>
		<p style="margin:0;">${weatherDesc.charAt(0).toUpperCase() + weatherDesc.slice(1)}</p>
		<p style="margin:0;">Avg Temp: ${avgTemp} °${currentUnit==='metric'?'C':'F'}</p>
	  </div>
	`;
  }
}

// Search city with autocomplete (geocoding)
let debounceTimeout = null;
cityInput.addEventListener('input', () => {
  const query = cityInput.value.trim();
  if (debounceTimeout) clearTimeout(debounceTimeout);
  if (query.length < 3) {
	autocompleteResults.innerHTML = '';
	return;
  }
  debounceTimeout = setTimeout(() => {
	fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(query)}&limit=5&appid=${apiKey}`)
	  .then(res => res.json())
	  .then(data => {
		autocompleteResults.innerHTML = '';
		data.forEach(loc => {
		  const div = document.createElement('div');
		  div.style.padding = '5px';
		  div.style.cursor = 'pointer';
		  div.innerHTML = `${loc.name}${loc.state ? ', '+loc.state : ''}, ${loc.country}`;
		  div.addEventListener('click', () => {
			cityInput.value = loc.name;
			autocompleteResults.innerHTML = '';
			lastCity = loc.name;
			fetchWeather(loc.name);
		  });
		  autocompleteResults.appendChild(div);
		});
	  });
  }, 300);
});

// Get weather button
document.getElementById('getWeatherBtn').addEventListener('click', () => {
  const city = cityInput.value.trim();
  if (city) {
	fetchWeather(city);
  }
});

// Use geolocation
document.getElementById('locateBtn').addEventListener('click', () => {
  if (navigator.geolocation) {
	showLoading();
	navigator.geolocation.getCurrentPosition(pos => {
	  hideLoading();
	  selectedLatLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
	  fetchWeatherByCoords(selectedLatLng.lat, selectedLatLng.lng);
	}, () => {
	  hideLoading();
	  alert('Unable to retrieve your location.');
	});
  } else {
	alert('Geolocation not supported.');
  }
});

// Show forecast button
document.getElementById('forecastBtn').addEventListener('click', () => {
  if (lastCity) {
	fetchForecast(lastCity);
  } else {
	alert('Please search or select a city first.');
  }
});

// Map selection
document.getElementById('mapSelectBtn').addEventListener('click', () => {
  document.getElementById('mapContainer').style.display='block';
  initMap();
});

// Confirm map selection
document.getElementById('confirmMapSelection').addEventListener('click', () => {
  if (selectedLatLng) {
	fetchWeatherByCoords(selectedLatLng.lat, selectedLatLng.lng);
	document.getElementById('mapContainer').style.display='none';
  } else {
	alert('Please select a location on the map.');
  }
});

// Initialize leaflet map
function initMap() {
  if (!map) {
	map = L.map('map').setView([20,0], 2);
	L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
	  attribution: '© OpenStreetMap contributors'
	}).addTo(map);

	map.on('click', function(e) {
	  selectedLatLng = e.latlng;
	  if (map.marker) {
		map.removeLayer(map.marker);
	  }
	  map.marker = L.marker(e.latlng).addTo(map);
	});
  } else {
	map.setView([20,0], 2);
	if (map.marker) {
	  map.removeLayer(map.marker);
	}
  }
}

// Initial theme detection
detectDeviceTheme();
</script>
</body>
</html>
