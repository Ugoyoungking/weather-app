<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Advanced Weather App with Themes</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="script.js" defer></script>
<style>
:root{--bg-color-light:#f0f8ff;--text-color-light:#000;--bg-color-dark:#222;--text-color-dark:#fff;--card-light:#fff;--card-dark:#333}
body{font-family:Arial,sans-serif;margin:0;padding:10px;background:var(--bg-color-light);color:var(--text-color-light);transition:.3s}
body.dark-theme{background:var(--bg-color-dark);color:var(--text-color-dark)}
#themeToggleBtn{position:fixed;top:10px;right:10px;padding:8px 12px;border:0;border-radius:4px;cursor:pointer;font-weight:bold;z-index:999;background:#555;color:#fff}
#controls{display:flex;justify-content:center;margin-bottom:10px}#search-section{flex:1 1 300px;display:flex;flex-direction:column;gap:5px;position:relative;max-width:800px}
#cityInput{padding:8px;font-size:1em}#autocompleteResults{border:1px solid #ccc;max-height:150px;overflow-y:auto;background:#fff;position:absolute;top:50px;width:100%;z-index:1000}
body.dark-theme #autocompleteResults{background:#333;border-color:#555;color:#fff}.result-row{padding:6px;cursor:pointer}.result-row:hover{background:rgba(0,0,0,.08)}
button{padding:8px;border:0;border-radius:4px;cursor:pointer;font-weight:bold}#getWeatherBtn{background:#4CAF50;color:#fff}#locateBtn{background:#2196F3;color:#fff}#forecastBtn{background:#ff9800;color:#fff}#mapSelectBtn{background:#9c27b0;color:#fff}
#unitToggle,#recentActions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:5px}#recentSearches{display:flex;gap:6px;flex-wrap:wrap}
.chip{background:#e3f2fd;color:#0d47a1;border-radius:999px;padding:4px 10px;font-size:.85rem;cursor:pointer}body.dark-theme .chip{background:#1e3a5f;color:#d7e9ff}
#weatherDisplay{max-width:900px;margin:20px auto;padding:10px;background:var(--card-light);border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,.1)}body.dark-theme #weatherDisplay{background:var(--card-dark);color:#fff}
#currentWeather,#forecastContainer,#airQualityContainer{margin-bottom:20px}#mapContainer{display:none;margin-bottom:20px}#map{height:300px}.muted{opacity:.75;font-size:.9rem}
@media(max-width:700px){#controls{flex-direction:column}}
</style>
</head>
<body>
<button id="themeToggleBtn">Switch to Dark Mode</button>
<h1 style="text-align:center">Advanced Weather App with Themes</h1>
<div id="controls"><div id="search-section">
  <input type="text" id="cityInput" placeholder="Search city..." autocomplete="off"/>
  <div id="autocompleteResults"></div>
  <div style="margin-top:5px;"><button id="getWeatherBtn">Get Weather</button><button id="locateBtn">Use My Location</button><button id="forecastBtn">Show 5-Day Forecast</button><button id="mapSelectBtn">Select on Map</button></div>
  <div id="unitToggle"><label><input type="radio" name="unit" value="metric" checked/> °C</label><label><input type="radio" name="unit" value="imperial"/> °F</label></div>
  <div id="recentActions"><div id="recentSearches"></div><button id="clearRecentBtn">Clear Recent</button></div>
</div></div>
<div id="mapContainer"><div id="map"></div><button id="confirmMapSelection" style="margin-top:10px;">Confirm Location</button></div>
<div id="aboutProject" style="max-width:900px;margin:10px auto 0;padding:10px;border-radius:8px;background:rgba(0,0,0,.04)"><h3 style="margin-top:0;">About this project</h3><p>This weather dashboard provides current weather, AQI insights, and 5-day forecasts using city search, your location, or map selection.</p><p class="muted">Developer: <a href="https://ugoyoungking.github.io/portfolio/" target="_blank" rel="noopener noreferrer">Ugoyoungking Portfolio</a></p></div>
<div id="weatherDisplay"><div id="loading" style="text-align:center; display:none;">Loading...</div><div id="currentWeather"></div><div id="airQualityContainer"></div><div id="forecastContainer"></div></div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const apiKey='f822fe46aea7d7f62842fb124e64db9b';
let currentUnit='metric',lastCity='',lastCoords=null,map,selectedLatLng=null,lastUpdated='',recentCities=JSON.parse(localStorage.getItem('recentCities')||'[]');
const cityInput=document.getElementById('cityInput'),autocompleteResults=document.getElementById('autocompleteResults'),forecastContainer=document.getElementById('forecastContainer'),currentWeatherDiv=document.getElementById('currentWeather'),airQualityContainer=document.getElementById('airQualityContainer'),loadingDiv=document.getElementById('loading'),themeToggleBtn=document.getElementById('themeToggleBtn'),recentSearchesDiv=document.getElementById('recentSearches');

const aqiLabels={1:'Good',2:'Fair',3:'Moderate',4:'Poor',5:'Very Poor'};
const formatTime=(unix,tz)=>new Date((unix+tz)*1000).toUTCString().slice(17,22);
function renderRecentSearches(){recentSearchesDiv.innerHTML=recentCities.length?'<strong>Recent:</strong> ':'';recentCities.forEach(city=>{const chip=document.createElement('span');chip.className='chip';chip.textContent=city;chip.onclick=()=>{cityInput.value=city;fetchWeather(city)};recentSearchesDiv.appendChild(chip);});}
function saveRecentCity(city){if(!city)return;recentCities=[city,...recentCities.filter(c=>c.toLowerCase()!==city.toLowerCase())].slice(0,6);localStorage.setItem('recentCities',JSON.stringify(recentCities));renderRecentSearches();}
function detectDeviceTheme(){const stored=localStorage.getItem('themeMode'),prefersDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches,useDark=stored?stored==='dark':prefersDark;document.body.classList.toggle('dark-theme',useDark);themeToggleBtn.textContent=useDark?'Switch to Light Mode':'Switch to Dark Mode';}
function showLoading(){loadingDiv.style.display='block'} function hideLoading(){loadingDiv.style.display='none'} function clearForecast(){forecastContainer.innerHTML=''}

async function fetchAirQuality(lat,lon){
  try{const res=await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${apiKey}`); if(!res.ok) throw new Error('AQI unavailable');
    const data=await res.json(); const aqi=data.list[0].main.aqi;
    airQualityContainer.innerHTML=`<h3>Air Quality</h3><p>AQI: <strong>${aqi}</strong> (${aqiLabels[aqi]||'Unknown'})</p>`;
  } catch { airQualityContainer.innerHTML='<p class="muted">Air quality data unavailable.</p>'; }
}

function displayCurrentWeather(data){
  const {name,main,weather,wind,sys,timezone}=data; const iconUrl=`https://openweathermap.org/img/wn/${weather[0].icon}@2x.png`; lastUpdated=new Date().toLocaleString();
  currentWeatherDiv.innerHTML=`<h2>Weather in ${name}</h2><img src="${iconUrl}" alt="${weather[0].description}"/><p style="font-size:1.2em;">Temperature: ${Math.round(main.temp)} °${currentUnit==='metric'?'C':'F'} (Feels like ${Math.round(main.feels_like)}°)</p><p>Condition: ${weather[0].description.charAt(0).toUpperCase()+weather[0].description.slice(1)}</p><p>Humidity: ${main.humidity}% • Pressure: ${main.pressure} hPa • Wind: ${Math.round(wind.speed)} ${currentUnit==='metric'?'m/s':'mph'}</p><p>Sunrise: ${formatTime(sys.sunrise,timezone)} • Sunset: ${formatTime(sys.sunset,timezone)}</p><p class="muted">Last updated: ${lastUpdated}</p>`;
}

async function fetchWeather(city){lastCity=city;showLoading();clearForecast();airQualityContainer.innerHTML='';try{const res=await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=${currentUnit}&appid=${apiKey}`);if(!res.ok)throw new Error('City not found');const data=await res.json();lastCoords={lat:data.coord.lat,lon:data.coord.lon};displayCurrentWeather(data);saveRecentCity(data.name);await fetchAirQuality(lastCoords.lat,lastCoords.lon);}catch(err){currentWeatherDiv.innerHTML=`<p style="color:red;">${err.message}</p>`;}finally{hideLoading();}}
async function fetchWeatherByCoords(lat,lon){showLoading();clearForecast();airQualityContainer.innerHTML='';try{const res=await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=${currentUnit}&appid=${apiKey}`);if(!res.ok)throw new Error('Unable to fetch weather data');const data=await res.json();displayCurrentWeather(data);lastCity=data.name;lastCoords={lat,lon};saveRecentCity(data.name);await fetchAirQuality(lat,lon);}catch(err){currentWeatherDiv.innerHTML=`<p style="color:red;">${err.message}</p>`;}finally{hideLoading();}}
async function fetchForecast(){if(!lastCity&&!lastCoords)return alert('Please search or select a city first.');showLoading();const endpoint=lastCoords?`https://api.openweathermap.org/data/2.5/forecast?lat=${lastCoords.lat}&lon=${lastCoords.lon}&units=${currentUnit}&appid=${apiKey}`:`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(lastCity)}&units=${currentUnit}&appid=${apiKey}`;try{const res=await fetch(endpoint);if(!res.ok)throw new Error('Forecast data not available');const data=await res.json();forecastContainer.innerHTML='<h3>5-Day Forecast</h3>';const byDay={};data.list.forEach(e=>{const d=e.dt_txt.split(' ')[0];(byDay[d] ||= []).push(e)});Object.keys(byDay).slice(0,5).forEach(date=>{const entries=byDay[date],avg=Math.round(entries.reduce((s,e)=>s+e.main.temp,0)/entries.length),min=Math.round(Math.min(...entries.map(e=>e.main.temp_min))),max=Math.round(Math.max(...entries.map(e=>e.main.temp_max)));forecastContainer.innerHTML+=`<div style="border:1px solid #ccc;padding:8px;border-radius:8px;margin-bottom:8px;"><h4>${date}</h4><p>${entries[0].weather[0].description}</p><p>Avg: ${avg}° • Low/High: ${min}°/${max}°</p></div>`;});}catch(err){forecastContainer.innerHTML=`<p style="color:red;">${err.message}</p>`;}finally{hideLoading();}}

let debounceTimeout=null;cityInput.addEventListener('input',()=>{const query=cityInput.value.trim();clearTimeout(debounceTimeout);if(query.length<3)return autocompleteResults.innerHTML='';debounceTimeout=setTimeout(async()=>{const res=await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(query)}&limit=5&appid=${apiKey}`),data=await res.json();autocompleteResults.innerHTML='';data.forEach(loc=>{const div=document.createElement('div');div.className='result-row';div.textContent=`${loc.name}${loc.state?', '+loc.state:''}, ${loc.country}`;div.onclick=()=>{cityInput.value=loc.name;autocompleteResults.innerHTML='';fetchWeather(loc.name)};autocompleteResults.appendChild(div);});},250);});
cityInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();const city=cityInput.value.trim();if(city)fetchWeather(city);}});
document.querySelectorAll('input[name="unit"]').forEach(r=>r.addEventListener('change',()=>{currentUnit=document.querySelector('input[name="unit"]:checked').value;if(lastCoords)fetchWeatherByCoords(lastCoords.lat,lastCoords.lon);else if(lastCity)fetchWeather(lastCity);}));
document.getElementById('clearRecentBtn').addEventListener('click',()=>{recentCities=[];localStorage.removeItem('recentCities');renderRecentSearches();});
document.getElementById('getWeatherBtn').onclick=()=>{const city=cityInput.value.trim();if(city)fetchWeather(city)};document.getElementById('locateBtn').onclick=()=>navigator.geolocation?navigator.geolocation.getCurrentPosition(p=>{selectedLatLng={lat:p.coords.latitude,lng:p.coords.longitude};fetchWeatherByCoords(selectedLatLng.lat,selectedLatLng.lng);},()=>alert('Unable to retrieve your location.')):alert('Geolocation not supported.');document.getElementById('forecastBtn').onclick=fetchForecast;
document.getElementById('mapSelectBtn').onclick=()=>{document.getElementById('mapContainer').style.display='block';initMap()};document.getElementById('confirmMapSelection').onclick=()=>{if(!selectedLatLng)return alert('Please select a location on the map.');fetchWeatherByCoords(selectedLatLng.lat,selectedLatLng.lng);document.getElementById('mapContainer').style.display='none';}
function initMap(){if(!map){map=L.map('map').setView([20,0],2);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors'}).addTo(map);map.on('click',e=>{selectedLatLng=e.latlng;if(map.marker)map.removeLayer(map.marker);map.marker=L.marker(e.latlng).addTo(map);});}setTimeout(()=>map.invalidateSize(),50)}
detectDeviceTheme();renderRecentSearches();themeToggleBtn.onclick=()=>{const dark=!document.body.classList.contains('dark-theme');document.body.classList.toggle('dark-theme',dark);themeToggleBtn.textContent=dark?'Switch to Light Mode':'Switch to Dark Mode';localStorage.setItem('themeMode',dark?'dark':'light')};
</script></body></html>
