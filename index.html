<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WeatherFlow Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="script.js" defer></script>

<style>
:root{
  --bg:linear-gradient(135deg,#e9f3ff 0%,#f6f9ff 45%,#edf7f5 100%);
  --surface:#ffffff;
  --surface-2:#f6f8ff;
  --text:#0d1b2a;
  --muted:#56657a;
  --primary:#2563eb;
  --primary-soft:#dbeafe;
  --success:#0f766e;
  --border:#d9e2f2;
}

body.dark-theme{
  --bg:linear-gradient(135deg,#090e1a 0%,#10182a 45%,#07141b 100%);
  --surface:#101a2e;
  --surface-2:#16233f;
  --text:#eaf2ff;
  --muted:#b8c5dd;
  --primary:#60a5fa;
  --primary-soft:#1d365e;
  --success:#2dd4bf;
  --border:#2a3a5e;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:1100px;
  margin:0 auto;
  padding:20px;
}

.hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.panel{
  background:color-mix(in srgb,var(--surface) 78%, transparent);
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px;
  margin-top:18px;
}

.controls-grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:16px;
}

#cityInput{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--surface-2);
}

.button-row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
}

button{
  padding:10px 12px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:600;
}

#getWeatherBtn{background:#2563eb;color:white}
#locateBtn{background:#0ea5e9;color:white}
#forecastBtn{background:#f59e0b}
#mapSelectBtn{background:#8b5cf6;color:white}

.card{
  background:var(--surface-2);
  padding:16px;
  border-radius:16px;
  border:1px solid var(--border);
  margin-top:10px;
}

#weatherPanel{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

#map{
  height:320px;
  border-radius:12px;
}

.mobile-nav{
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  background:var(--surface);
  padding:8px;
  border-radius:16px;
}

.mobile-nav button{
  background:var(--surface-2);
}

@media(max-width:900px){
  .controls-grid,
  #weatherPanel{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

<header class="hero">
  <div>
    <h1>WeatherFlow Dashboard</h1>
    <p>Advanced weather insights with analytics & forecasts</p>
  </div>
  <button id="themeToggleBtn">Switch Theme</button>
</header>

<section class="panel">
  <div class="controls-grid">
    <div>
      <input type="text" id="cityInput" placeholder="Search city..." />
      <div class="button-row">
        <button id="getWeatherBtn">Get Weather</button>
        <button id="locateBtn">Use My Location</button>
        <button id="forecastBtn">5-Day Forecast</button>
        <button id="mapSelectBtn">Pick on Map</button>
      </div>
    </div>

    <div>
      <label><input type="radio" name="unit" checked> °C</label>
      <label><input type="radio" name="unit"> °F</label>
    </div>
  </div>
</section>

<section id="mapContainer" class="panel" style="display:none">
  <h3>Select Location</h3>
  <div id="map"></div>
</section>

<section id="weatherPanel" class="panel">
  <div class="card" id="currentWeather"></div>
  <div class="card" id="forecastContainer"></div>
</section>

<section class="panel">
  <h3>Analytics</h3>
  <canvas id="chart"></canvas>
</section>

</div>

<nav class="mobile-nav">
  <button>Search</button>
  <button>Now</button>
  <button>Charts</button>
  <button>Map</button>
</nav>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
